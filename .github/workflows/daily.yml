# 每日播报 · GitHub Actions 工作流模板。
# 把它放到你那个 broadcast 仓库的 .github/workflows/daily.yml —— GitHub 就会【每天免费替你跑】，
# 关掉电脑也照跑。这就是 lab 第 5 幕（kp-05）的落地：
#
#   调度器（这个 schedule = GitHub 的闹钟）→ agent（cron_entry.py）→ MCP/API（碰外部世界的手）
#
# 免费额度：public 仓库无限分钟；private 仓库 GitHub Free 每月 2000 分钟。播报一天 1–3 分钟，绰绰有余。
#
# ⚠️ 密钥放 仓库 Settings → Secrets and variables → Actions（绝不写进这个 YAML —— kp-04「凭据即密码」）。
#    注意：Secret 名字【不能以 GITHUB_ 开头】（GitHub 保留），所以 token 这个 secret 叫 GH_BROADCAST_TOKEN。

name: daily-broadcast

on:
  schedule:
    - cron: "17 1 * * *"        # UTC 01:17 = 北京 09:17；避开整点（整点高峰会被延迟甚至丢任务）
  workflow_dispatch: {}          # 也能在 Actions 页点「Run workflow」立刻手动测一次

permissions:
  contents: write                # 让它能把更新后的 digest.md 提交回仓库（见最后一步）

jobs:
  broadcast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: run broadcast
        env:
          PARALLIGHT_API_KEY: ${{ secrets.PARALLIGHT_API_KEY }}
          PARALLIGHT_BASE_URL: https://token.parallight.ai/api/llm
          PARALLIGHT_MODEL: claude-sonnet-4-6
          GITHUB_PERSONAL_ACCESS_TOKEN: ${{ secrets.GH_BROADCAST_TOKEN }}
          # 渠道 A（默认）：Gmail
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          # 渠道 B（在大陆）：把 config.yaml 设 channel: feishu，并改用这个 secret：
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: python cron_entry.py
      - name: persist digest（既存「记忆」，又顺手让定时别被 60 天闲置停掉）
        run: |
          git config user.name "broadcast-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add digest.md 2>/dev/null || true
          git commit -m "digest $(date -u +%F)" 2>/dev/null && git push || echo "no change to commit"
