<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tool 调用机制 · 源代码 ↔ 真实报文</title>
<style>
  :root{
    --bg:#F4EEE4; --card:#FCFAF5; --ink:#2A2521; --muted:#8A7E72;
    --terra:#BF5B3F; --terra-soft:#E7C9bd; --line:#E4DACB;
    --code-bg:#2C2925; --code-ink:#EBE4D8; --green:#4F7A5B; --blue:#3E6B8C;
    --hi:#FBE7B0; --hi-line:#F4D27A;
    --mono:"SF Mono",ui-monospace,"JetBrains Mono",Menlo,Consolas,monospace;
    --serif:"Iowan Old Style","Palatino Linotype",Georgia,serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);
    line-height:1.55;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1180px;margin:0 auto;padding:28px 20px 60px}
  header h1{font-family:var(--serif);font-size:clamp(22px,3.2vw,30px);margin:0 0 6px;
    letter-spacing:-.01em}
  header p{margin:0;color:var(--muted);font-size:14.5px;max-width:62ch}
  .sub{font-family:var(--mono);font-size:12px;color:var(--terra);margin-top:8px;
    text-transform:uppercase;letter-spacing:.08em}

  /* lesson toggle */
  .modes{display:inline-flex;background:var(--card);border:1.5px solid var(--line);
    border-radius:11px;padding:4px;gap:4px;margin:20px 0 4px}
  .mode{border:0;background:transparent;font-family:inherit;font-size:13.5px;font-weight:600;
    color:var(--muted);padding:7px 16px;border-radius:8px;cursor:pointer;transition:.15s}
  .mode.active{background:var(--terra);color:#fff;box-shadow:0 3px 12px -5px rgba(191,91,63,.6)}
  .mode-hint{font-size:12.5px;color:var(--muted);margin:6px 0 0}

  /* step rail */
  .steps{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0 18px}
  .step{flex:1 1 180px;min-width:150px;text-align:left;cursor:pointer;
    background:var(--card);border:1.5px solid var(--line);border-radius:12px;
    padding:11px 13px;transition:.15s;font-family:inherit}
  .step:hover{border-color:var(--terra-soft)}
  .step .n{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.05em}
  .step .t{font-size:14px;font-weight:600;margin-top:2px}
  .step .who{font-size:11.5px;margin-top:4px;font-family:var(--mono)}
  .step.active{border-color:var(--terra);background:#fff;
    box-shadow:0 4px 18px -8px rgba(191,91,63,.45)}
  .who.model{color:var(--blue)} .who.you{color:var(--green)} .who.spec{color:var(--muted)}

  .panes{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:840px){.panes{grid-template-columns:1fr}}
  .pane{background:var(--card);border:1.5px solid var(--line);border-radius:14px;overflow:hidden}
  .pane h2{margin:0;padding:11px 15px;font-size:12.5px;font-family:var(--mono);
    letter-spacing:.06em;text-transform:uppercase;color:var(--muted);
    border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--terra)}

  /* code */
  pre.code{margin:0;background:var(--code-bg);color:var(--code-ink);
    font-family:var(--mono);font-size:12.5px;line-height:1.75;overflow:auto;padding:14px 0}
  pre.code .row{display:block;padding:0 16px;white-space:pre}
  pre.code .ln{display:inline-block;width:24px;color:#6b655c;user-select:none;text-align:right;
    margin-right:14px}
  pre.code .row.hl{background:rgba(244,210,122,.16);box-shadow:inset 3px 0 0 var(--hi-line)}
  .cmt{color:#9b8f7d} .kw{color:#d98a6a} .str{color:#9fc08a} .fn{color:#e7c97a}

  /* right pane content */
  .io{padding:15px}
  .io.io-anim{animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .blk{margin:0 0 13px}
  .blk:last-child{margin-bottom:0}
  .lbl{font-family:var(--mono);font-size:11px;letter-spacing:.05em;text-transform:uppercase;
    color:var(--muted);margin-bottom:5px;display:flex;align-items:center;gap:7px}
  .tag{font-family:var(--mono);font-size:10.5px;padding:1px 7px;border-radius:20px;font-weight:600}
  .tag.model{background:#e3edf5;color:var(--blue)}
  .tag.you{background:#e3efe6;color:var(--green)}
  .tag.spec{background:#efe9df;color:var(--muted)}
  .box{font-family:var(--mono);font-size:12.5px;background:#fff;border:1px solid var(--line);
    border-radius:9px;padding:10px 12px;white-space:pre-wrap;word-break:break-word;line-height:1.6}
  .box .k{color:var(--terra)}
  .box .id{color:var(--blue);font-weight:600}
  .box .id.same{background:var(--hi);border-radius:4px;padding:0 3px}
  .stop{display:inline-block;font-family:var(--mono);font-weight:700;padding:2px 9px;border-radius:6px;font-size:12.5px}
  .stop.tool{background:#fbe7d9;color:var(--terra)}
  .stop.end{background:#e3efe6;color:var(--green)}
  .insight{margin-top:13px;border-left:3px solid var(--terra);background:#fff;
    padding:10px 13px;border-radius:0 9px 9px 0;font-size:13.5px}
  .insight b{color:var(--terra)}
  .bang{color:var(--terra);font-weight:700}
  .arrow{text-align:center;color:var(--muted);font-family:var(--mono);font-size:12px;margin:6px 0}
  footer{margin-top:26px;text-align:center;color:var(--muted);font-size:12px;font-family:var(--mono)}
  .legend{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-top:10px;font-size:12px}
  .legend span{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono)}
  .sw{width:10px;height:10px;border-radius:3px;display:inline-block}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="sub">Parallight · 课程可视化</div>
    <h1>课程 dashboard — 过程输出 ↔ 代码</h1>
    <p>左边是<b>你跑的代码</b>，右边是它<b>真跑一次</b>的输出/报文。上面每一格 = 课程的一步——你每跑一个实验，这里就会多一格。</p>
    <div class="legend">
      <span><i class="sw" style="background:#3E6B8C"></i>模型在想（请求）</span>
      <span><i class="sw" style="background:#4F7A5B"></i>你的代码在做（执行）</span>
      <span><i class="sw" style="background:#8A7E72"></i>静态说明（schema）</span>
    </div>
  </header>

  <div class="modes" id="modes"></div>
  <p class="mode-hint" id="modeHint"></p>

  <div class="steps" id="steps"></div>

  <div class="panes">
    <div class="pane">
      <h2><span class="dot"></span> <span id="codeTitle">源代码</span></h2>
      <pre class="code" id="code"></pre>
    </div>
    <div class="pane">
      <h2><span class="dot"></span> 真实输入 / 输出</h2>
      <div class="io" id="io"></div>
    </div>
  </div>

  <footer>课程的每一步都在这里被看见 ｜ Parallight</footer>
</div>

<script src="dashboard-data.js"></script>
<script>
// ===== 从 dashboard-data.js 读实验清单，动态生成 tab + LESSONS =====
// 不变要求：课程每一步都可视化。新实验 append 进 dashboard-data.js 的 window.DASHBOARD 即可，HTML 不用改。
const DASHBOARD = (window.DASHBOARD || []);
const LESSONS = Object.fromEntries(DASHBOARD.map(e => [e.key, e]));
document.getElementById('modes').innerHTML = DASHBOARD
  .map((e, i) => `<button class="mode${i === 0 ? ' active' : ''}" data-m="${e.key}">${e.label}</button>`)
  .join('');
const codeEl=document.getElementById('code');
const ioEl=document.getElementById('io');
const stepsEl=document.getElementById('steps');
const codeTitle=document.getElementById('codeTitle');
const modeHint=document.getElementById('modeHint');
let MODE=(DASHBOARD[0]||{}).key;

function cur(){ return LESSONS[MODE]; }
function renderCode(hl){
  codeEl.innerHTML = cur().code.map(([n,html])=>{
    const on = hl.includes(n) ? ' hl':'';
    return `<span class="row${on}"><span class="ln">${n}</span>${html}</span>`;
  }).join('');
}
function renderSteps(active){
  stepsEl.innerHTML = cur().steps.map((s,i)=>`
    <button class="step${i===active?' active':''}" data-i="${i}">
      <div class="n">${s.n}</div>
      <div class="t">${s.t}</div>
      <div class="who ${s.who}">${s.whoTxt}</div>
    </button>`).join('');
  [...stepsEl.children].forEach(b=>b.onclick=()=>select(+b.dataset.i));
}
function select(i){
  renderSteps(i);
  renderCode(cur().steps[i].lines);
  ioEl.classList.remove('io-anim'); void ioEl.offsetWidth; ioEl.classList.add('io-anim');
  ioEl.innerHTML = cur().steps[i].io;
}
function setMode(m){
  MODE=m;
  [...document.querySelectorAll('.mode')].forEach(b=>b.classList.toggle('active',b.dataset.m===m));
  codeTitle.textContent = '源代码 · '+cur().file;
  modeHint.textContent = cur().hint;
  select(0);
}
[...document.querySelectorAll('.mode')].forEach(b=>b.onclick=()=>setMode(b.dataset.m));
setMode((DASHBOARD[0]||{}).key);
// keyboard ← →
document.addEventListener('keydown',e=>{
  const cur=[...stepsEl.children].findIndex(b=>b.classList.contains('active'));
  const n=LESSONS[MODE].steps.length;
  if(e.key==='ArrowRight') select(Math.min(n-1,cur+1));
  if(e.key==='ArrowLeft')  select(Math.max(0,cur-1));
});
</script>
</body>
</html>
